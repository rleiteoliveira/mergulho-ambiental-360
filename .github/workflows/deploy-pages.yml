name: Deploy web demo (GitHub Pages)

# Publica APENAS a pasta web-demo/ no GitHub Pages.
# Requer: repositorio publico (ou GitHub Pro) e Settings > Pages > Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez; cancela execucoes antigas em andamento.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload web-demo as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-demo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
